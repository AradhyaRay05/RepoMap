services:
  postgres:
    image: postgres:16-alpine
    container_name: roa_postgres
    environment:
      POSTGRES_DB: repomap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Aradhya@123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repomap"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roa_backend
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: "postgresql://postgres:Aradhya%40123@postgres:5432/repomap"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roa_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
